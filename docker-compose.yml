
services:
  postgres:
    image: postgres:15
    container_name: ppr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ppr_user
      POSTGRES_PASSWORD: ppr_password
      POSTGRES_DB: ppr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    container_name: ppr_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ppr_user
      MB_DB_PASS: ppr_password
      MB_DB_HOST: postgres
    depends_on:
      - postgres

volumes:
  postgres_data: